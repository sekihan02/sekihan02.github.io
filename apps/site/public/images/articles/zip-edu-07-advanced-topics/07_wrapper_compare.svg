<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="290" viewBox="0 0 1100 290">
  <style>
    .title { font: 700 28px "Noto Sans JP", sans-serif; fill: #111827; }
    .label { font: 700 18px "Noto Sans JP", sans-serif; fill: #111827; }
    .small { font: 14px "Noto Sans JP", sans-serif; fill: #374151; }
    .box { stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
  </style>
  <text x="40" y="42" class="title">raw DEFLATE / zlib / gzip の違い</text>
  <rect x="40" y="100" width="260" height="110" fill="#dcfce7" class="box"/>
  <text x="170" y="135" text-anchor="middle" class="label">raw DEFLATE</text>
  <text x="170" y="165" text-anchor="middle" class="small">ブロックヘッダ + 圧縮データだけ</text>
  <rect x="360" y="100" width="280" height="110" fill="#dbeafe" class="box"/>
  <text x="500" y="135" text-anchor="middle" class="label">zlib</text>
  <text x="500" y="160" text-anchor="middle" class="small">zlib ヘッダ</text>
  <text x="500" y="183" text-anchor="middle" class="small">raw DEFLATE</text>
  <text x="500" y="206" text-anchor="middle" class="small">Adler-32</text>
  <rect x="700" y="100" width="320" height="110" fill="#fef3c7" class="box"/>
  <text x="860" y="135" text-anchor="middle" class="label">gzip</text>
  <text x="860" y="160" text-anchor="middle" class="small">gzip ヘッダ</text>
  <text x="860" y="183" text-anchor="middle" class="small">raw DEFLATE</text>
  <text x="860" y="206" text-anchor="middle" class="small">CRC32 + 元サイズ</text>
  <text x="40" y="255" class="small">ZIP の method 8 では、ふつう raw DEFLATE が file data として入る。</text>
</svg>
