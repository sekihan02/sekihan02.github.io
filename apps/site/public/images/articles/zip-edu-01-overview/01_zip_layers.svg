<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="360" viewBox="0 0 1150 360">
  <style>
    .title { font: 700 28px "Noto Sans JP", sans-serif; fill: #111827; }
    .label { font: 700 18px "Noto Sans JP", sans-serif; fill: #111827; }
    .small { font: 14px "Noto Sans JP", sans-serif; fill: #374151; }
    .box { stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
  </style>
  <text x="40" y="42" class="title">ZIP コンテナと Deflate の担当範囲</text>
  <rect x="40" y="100" width="1070" height="210" fill="#f8fafc" class="box"/>
  <rect x="80" y="140" width="990" height="60" fill="#dbeafe" class="box"/>
  <rect x="120" y="212" width="260" height="62" fill="#dcfce7" class="box"/>
  <rect x="410" y="212" width="260" height="62" fill="#dcfce7" class="box"/>
  <rect x="700" y="212" width="260" height="62" fill="#fde68a" class="box"/>
  <text x="575" y="125" text-anchor="middle" class="label">ZIP コンテナが担当すること</text>
  <text x="575" y="165" text-anchor="middle" class="small">ファイル名 / ヘッダ / オフセット / 中央ディレクトリ / EOCD</text>
  <text x="250" y="241" text-anchor="middle" class="label">ファイルデータ #1</text>
  <text x="250" y="260" text-anchor="middle" class="small">中身は method に依存</text>
  <text x="540" y="241" text-anchor="middle" class="label">ファイルデータ #2</text>
  <text x="540" y="260" text-anchor="middle" class="small">Store か Deflate</text>
  <text x="830" y="241" text-anchor="middle" class="label">中央ディレクトリ</text>
  <text x="830" y="260" text-anchor="middle" class="small">目次と位置情報</text>
  <text x="80" y="330" class="small">Deflate は「ファイルデータ #n の中身」をどう圧縮するか担当し、ZIP は「そのデータをどこにどう並べるか」を担当する。</text>
</svg>
