<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320" viewBox="0 0 1100 320">
  <style>
    .title { font: 700 28px "Noto Sans JP", sans-serif; fill: #111827; }
    .label { font: 700 18px "Noto Sans JP", sans-serif; fill: #111827; }
    .small { font: 14px "Noto Sans JP", sans-serif; fill: #374151; }
    .box { stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827"/>
    </marker>
  </defs>
  <text x="40" y="42" class="title">ZIP は「ファイルをまとめる箱」+「必要なら圧縮」</text>
  <rect x="40" y="90" width="240" height="160" fill="#e0f2fe" class="box"/>
  <text x="160" y="125" text-anchor="middle" class="label">入力ファイル</text>
  <text x="160" y="160" text-anchor="middle" class="small">a.txt</text>
  <text x="160" y="185" text-anchor="middle" class="small">deep/b.txt</text>
  <text x="160" y="210" text-anchor="middle" class="small">image.png</text>
  <text x="160" y="235" text-anchor="middle" class="small">...</text>
  <line x1="300" y1="170" x2="380" y2="170" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="400" y="90" width="330" height="160" fill="#dcfce7" class="box"/>
  <text x="565" y="125" text-anchor="middle" class="label">ZIP 本体の前半</text>
  <text x="565" y="160" text-anchor="middle" class="small">ローカルヘッダ #1</text>
  <text x="565" y="185" text-anchor="middle" class="small">ファイルデータ #1</text>
  <text x="565" y="210" text-anchor="middle" class="small">ローカルヘッダ #2 / ファイルデータ #2</text>
  <line x1="750" y1="170" x2="830" y2="170" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="850" y="90" width="210" height="160" fill="#fef3c7" class="box"/>
  <text x="955" y="125" text-anchor="middle" class="label">ZIP 本体の後半</text>
  <text x="955" y="160" text-anchor="middle" class="small">中央ディレクトリ</text>
  <text x="955" y="185" text-anchor="middle" class="small">EOCD</text>
  <text x="955" y="210" text-anchor="middle" class="small">どこに何があるかの目次</text>
  <text x="40" y="290" class="small">ポイント: ZIP は「圧縮アルゴリズム」そのものではなく、複数ファイルを並べて最後に目次を置くコンテナ形式。</text>
</svg>
