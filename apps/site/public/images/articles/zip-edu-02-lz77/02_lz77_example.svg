<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360">
  <style>
    .title { font: 700 28px "Noto Sans JP", sans-serif; fill: #111827; }
    .label { font: 700 18px "Noto Sans JP", sans-serif; fill: #111827; }
    .small { font: 14px "Noto Sans JP", sans-serif; fill: #374151; }
    .cell { stroke: #1f2937; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827"/>
    </marker>
  </defs>
  <text x="40" y="42" class="title">具体例: `abababababab` を LZ77 でどう見るか</text>
  <text x="40" y="88" class="label">1. 元データ</text>
  <g transform="translate(40,110)">
    <rect x="0" y="0" width="70" height="54" fill="#e0f2fe" class="cell"/><text x="35" y="33" text-anchor="middle" class="label">a</text>
    <rect x="70" y="0" width="70" height="54" fill="#e0f2fe" class="cell"/><text x="105" y="33" text-anchor="middle" class="label">b</text>
    <rect x="140" y="0" width="70" height="54" fill="#dbeafe" class="cell"/><text x="175" y="33" text-anchor="middle" class="label">a</text>
    <rect x="210" y="0" width="70" height="54" fill="#dbeafe" class="cell"/><text x="245" y="33" text-anchor="middle" class="label">b</text>
    <rect x="280" y="0" width="70" height="54" fill="#dbeafe" class="cell"/><text x="315" y="33" text-anchor="middle" class="label">a</text>
    <rect x="350" y="0" width="70" height="54" fill="#dbeafe" class="cell"/><text x="385" y="33" text-anchor="middle" class="label">b</text>
    <rect x="420" y="0" width="70" height="54" fill="#dbeafe" class="cell"/><text x="455" y="33" text-anchor="middle" class="label">a</text>
    <rect x="490" y="0" width="70" height="54" fill="#dbeafe" class="cell"/><text x="525" y="33" text-anchor="middle" class="label">b</text>
    <rect x="560" y="0" width="70" height="54" fill="#dbeafe" class="cell"/><text x="595" y="33" text-anchor="middle" class="label">a</text>
    <rect x="630" y="0" width="70" height="54" fill="#dbeafe" class="cell"/><text x="665" y="33" text-anchor="middle" class="label">b</text>
    <rect x="700" y="0" width="70" height="54" fill="#dbeafe" class="cell"/><text x="735" y="33" text-anchor="middle" class="label">a</text>
    <rect x="770" y="0" width="70" height="54" fill="#dbeafe" class="cell"/><text x="805" y="33" text-anchor="middle" class="label">b</text>
  </g>
  <text x="40" y="215" class="label">2. 最初の `ab` はそのまま出す</text>
  <rect x="40" y="235" width="120" height="56" fill="#dcfce7" class="cell"/>
  <text x="100" y="270" text-anchor="middle" class="label">LIT a</text>
  <rect x="170" y="235" width="120" height="56" fill="#dcfce7" class="cell"/>
  <text x="230" y="270" text-anchor="middle" class="label">LIT b</text>
  <line x1="315" y1="263" x2="420" y2="263" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="440" y="225" width="320" height="76" fill="#fef3c7" class="cell"/>
  <text x="600" y="258" text-anchor="middle" class="label">残りは 2 文字前を 10 文字ぶん参照</text>
  <text x="600" y="283" text-anchor="middle" class="small">MATCH(長さ=10, 距離=2)</text>
  <text x="40" y="332" class="small">出力イメージ: `LIT a`, `LIT b`, `MATCH(10, 2)`</text>
</svg>
